# Example nginx config for docker-compose.example.yml. Serves the app's
# storage directly (avoiding the app process itself), proxies everything
# else through to the app service.
#
# This config doesn't handle HTTPS, that should be done by your actual
# reverse proxy.
#
# Paths must match src/main.rs's actix_files mounts:
#   /static  -> storage/static
#   /storage -> storage/public

server {
    listen 80;

    location /static/ {
        alias /app/storage/static/;
    }

    location /storage/ {
        alias /app/storage/public/;
        autoindex off;

        # content-addressed files safe to cache forever
        # since the hash is the filename
        location ~ "^/storage/(.*/[a-f0-9]{2}/[a-f0-9]{64}(?:\.[a-z0-9]+)?)/?$" {
            alias /app/storage/public/$1;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }

    location / {
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
